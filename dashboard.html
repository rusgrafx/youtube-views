<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Song Views Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --surface2: #1a1a1a;
    --border: #252525;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #4a4a4a;
    --muted2: #777;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── STARTUP SCREEN ── */
  #loading-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    position: relative;
  }

  #loading-screen::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 55% 45% at 15% 25%, rgba(232,255,71,0.05) 0%, transparent 55%),
      radial-gradient(ellipse 45% 55% at 85% 75%, rgba(255,107,53,0.04) 0%, transparent 55%);
    pointer-events: none;
  }

  .upload-inner {
    max-width: 420px;
    width: 100%;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .eyebrow {
    font-size: 10px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    display: block;
  }

  .upload-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 6vw, 44px);
    font-weight: 800;
    line-height: 1.05;
    color: #fff;
    margin-bottom: 14px;
  }

  .upload-title em {
    color: var(--accent);
    font-style: normal;
  }

  .upload-sub {
    font-size: 12px;
    color: var(--muted2);
    line-height: 1.8;
    margin-bottom: 32px;
  }

  .upload-sub strong { color: var(--text); }

  .btn-upload-alt {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 12px 28px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .btn-upload-alt:hover { border-color: var(--accent); color: var(--accent); }

  /* ── DASHBOARD ── */
  #dashboard { display: none; min-height: 100vh; }

  .dash-header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    background: rgba(13,13,13,0.96);
    backdrop-filter: blur(12px);
    z-index: 10;
  }

  .dash-brand {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .dash-brand .dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(0.7); }
  }

  .dash-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .dash-file-info { font-size: 11px; color: var(--muted2); }
  .dash-file-info strong { color: var(--text); }

  .btn-sm {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted2);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }

  #file-input { display: none; }

  /* ── BODY ── */
  .dash-body {
    padding: 32px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 36px;
    animation: fadeUp 0.5s ease both;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    transition: border-color 0.2s;
  }

  .stat-card:hover { border-color: var(--accent); }

  .stat-card .sc-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted2);
    margin-bottom: 10px;
    display: block;
  }

  .stat-card .sc-val {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
    word-break: break-word;
  }

  .stat-card .sc-sub { font-size: 10px; color: var(--muted2); margin-top: 5px; }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted2);
  }

  .date-select-wrap {
    position: relative;
    display: inline-flex;
    align-items: center;
  }

  .date-select-wrap::after {
    content: '▾';
    position: absolute;
    right: 12px;
    font-size: 10px;
    color: var(--accent);
    pointer-events: none;
  }

  .date-select {
    appearance: none;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 7px 32px 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color 0.2s;
    outline: none;
  }

  .date-select:hover, .date-select:focus { border-color: var(--accent); }

  .date-nav {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .date-arrow {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted2);
    font-size: 12px;
    width: 28px; height: 28px;
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .date-arrow:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .date-arrow:disabled { opacity: 0.25; cursor: default; }

  .chart-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 28px;
    animation: fadeUp 0.5s 0.1s ease both;
  }

  .song-row {
    display: grid;
    grid-template-columns: 200px 1fr 90px;
    align-items: center;
    gap: 16px;
    padding: 11px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .song-row:last-child { border-bottom: none; }

  .song-name {
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0.85;
  }

  .bar-track {
    background: var(--surface2);
    border-radius: 3px;
    height: 24px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 3px;
    width: 0;
    transition: width 0.9s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
  }

  .bar-fill::after {
    content: '';
    position: absolute;
    right: 0; top: 0;
    width: 3px; height: 100%;
    background: rgba(255,255,255,0.35);
    border-radius: 0 3px 3px 0;
  }

  .bar-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }

  .bar-views {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
  }

  .bar-delta { font-size: 10px; color: #5cff8a; }
  .bar-delta.neg { color: var(--accent2); }
  .bar-delta.zero { color: var(--muted2); }

  .timeline-section {
    margin-top: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 28px;
    animation: fadeUp 0.5s 0.2s ease both;
  }

  .spark-row {
    display: grid;
    grid-template-columns: 200px 1fr 80px;
    align-items: center;
    gap: 16px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .spark-row:last-child { border-bottom: none; }
  canvas.spark { width: 100%; height: 36px; display: block; }

  .spark-growth { font-size: 11px; text-align: right; }

  .spark-growth .pct {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    display: block;
    color: #5cff8a;
  }

  .spark-growth .pct.neg { color: var(--accent2); }
  .spark-growth small { font-size: 10px; color: var(--muted2); }

  /* Drag-over overlay */
  .drop-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(13,13,13,0.9);
    border: 2px dashed var(--accent);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
    pointer-events: none;
  }

  .drop-overlay.show { display: flex; }
  .drop-overlay span { font-size: 13px; font-family: 'DM Mono', monospace; font-weight: 400; color: var(--muted2); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .tip {
    position: fixed;
    background: #1c1c1c;
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 11px;
    color: var(--text);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.12s;
    z-index: 999;
    white-space: nowrap;
  }

  .tip.show { opacity: 1; }

  @media (max-width: 600px) {
    .song-row, .spark-row { grid-template-columns: 120px 1fr 60px; }
    .song-name { font-size: 10px; }
    .dash-body { padding: 20px 16px; }
    .dash-header { padding: 16px; }
  }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="upload-inner">
    <span class="eyebrow">ViewTrack</span>
    <h1 class="upload-title">Load <em>data file</em></h1>
    <p class="upload-sub">Select <strong id="json-filename-hint"></strong> to get started.<br>You can also drag and drop the file anywhere on this page.</p>
    <button class="btn-upload-alt" id="btn-startup-upload">📂 Select JSON file</button>
  </div>
</div>

<div id="dashboard">
  <div class="dash-header">
    <div class="dash-brand"><div class="dot"></div>ViewTrack</div>
    <div class="dash-right">
      <div class="dash-file-info" id="file-info"></div>
      <button class="btn-sm" id="btn-load-file">📂 Load file</button>
      <button class="btn-sm" id="btn-reload">↺ Reload JSON</button>
    </div>
  </div>
  <div class="dash-body">
    <div class="stats-row" id="stats-row"></div>
    <div class="section-header">
      <span class="section-title">Views by date</span>
      <div class="date-nav">
        <button class="date-arrow" id="date-prev" title="Previous date">‹</button>
        <div class="date-select-wrap">
          <select class="date-select" id="date-select"></select>
        </div>
        <button class="date-arrow" id="date-next" title="Next date">›</button>
      </div>
    </div>
    <div class="chart-container" id="chart-container"></div>
    <div class="timeline-section" id="timeline-section">
      <div class="section-header" style="margin-bottom:16px">
        <span class="section-title">Growth sparklines</span>
      </div>
      <div id="sparklines"></div>
    </div>
  </div>
</div>

<div class="drop-overlay" id="drop-overlay">
  Drop to load file
  <span>JSON accepted</span>
</div>

<div class="tip" id="tip"></div>
<input type="file" id="file-input" accept=".json">

<script>
const JSON_FILE = `${new Date().getFullYear()}_views_data.json`;
const COLORS = [
  "#e8ff47","#ff6b35","#00d4ff","#ff4d9e","#7fff6e","#ffaa00","#a78bfa",
  "#34d399","#fb7185","#38bdf8","#fbbf24","#c084fc"
];

let csvData = null;
let activeDate = null;

// ── SCREENS ───────────────────────────────────────────────────
function show(name) {
  document.getElementById("loading-screen").style.display = name === "startup" ? "flex" : "none";
  document.getElementById("dashboard").style.display      = name === "dash"    ? "block" : "none";
}

// ── BOOT ──────────────────────────────────────────────────────
async function boot() {
  // Try auto-fetch first (works when served over HTTP)
  if (window.location.protocol !== "file:") {
    try {
      const res = await fetch(JSON_FILE);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      loadData(await res.json(), JSON_FILE);
      return;
    } catch (e) { /* fall through to file picker */ }
  }
  // file:// or fetch failed — show startup screen
  document.getElementById("json-filename-hint").textContent = JSON_FILE;
  show("startup");
}

// ── DATA ──────────────────────────────────────────────────────
function loadData(json, sourceName) {
  if (!json.songs || !json.dates) throw new Error("Invalid JSON structure.");
  csvData = json;
  activeDate = csvData.dates[csvData.dates.length - 1];
  document.getElementById("file-info").innerHTML =
    `<strong>${sourceName}</strong> &nbsp;·&nbsp; ${csvData.songs.length} songs &nbsp;·&nbsp; ${csvData.dates.length} date${csvData.dates.length > 1 ? 's' : ''}`;
  show("dash");
  renderDashboard();
}

// ── FILE HANDLING ─────────────────────────────────────────────
const fileInput = document.getElementById("file-input");

fileInput.addEventListener("change", e => {
  const f = e.target.files[0];
  if (f) handleFile(f);
  fileInput.value = "";
});

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      loadData(JSON.parse(e.target.result), file.name);
    } catch (err) { alert("Error loading file: " + err.message); }
  };
  reader.readAsText(file, "UTF-8");
}

// ── DRAG & DROP ───────────────────────────────────────────────
const dropOverlay = document.getElementById("drop-overlay");
let dragCnt = 0;
document.addEventListener("dragenter", e => {
  if ([...e.dataTransfer.items].some(i => i.kind === "file")) { dragCnt++; dropOverlay.classList.add("show"); }
});
document.addEventListener("dragleave", () => { if (--dragCnt <= 0) { dragCnt = 0; dropOverlay.classList.remove("show"); } });
document.addEventListener("dragover", e => e.preventDefault());
document.addEventListener("drop", e => {
  e.preventDefault(); dragCnt = 0; dropOverlay.classList.remove("show");
  const f = e.dataTransfer.files[0]; if (f) handleFile(f);
});

// ── BUTTON WIRING ─────────────────────────────────────────────
document.getElementById("btn-startup-upload").addEventListener("click", () => fileInput.click());
document.getElementById("btn-load-file").addEventListener("click", () => fileInput.click());
document.getElementById("btn-reload").addEventListener("click", async () => {
  if (window.location.protocol !== "file:") {
    try {
      const res = await fetch(JSON_FILE + "?t=" + Date.now()); // cache-bust
      if (!res.ok) throw new Error();
      loadData(await res.json(), JSON_FILE);
      return;
    } catch (e) { /* fall through */ }
  }
  fileInput.click();
});

// ── RENDER ────────────────────────────────────────────────────
function renderDashboard() {
  renderStats(); renderDateTabs(); renderChart(); renderSparklines();
}

function renderStats() {
  const total = csvData.songs.reduce((s, x) => s + (x.views[activeDate] || 0), 0);
  const top   = csvData.songs.reduce((a, b) => (b.views[activeDate]||0) > (a.views[activeDate]||0) ? b : a);
  const prev  = csvData.dates[csvData.dates.indexOf(activeDate) - 1];
  const tPrev = prev ? csvData.songs.reduce((s, x) => s + (x.views[prev] || 0), 0) : null;

  document.getElementById("stats-row").innerHTML = `
    <div class="stat-card">
      <span class="sc-label">Total Views</span>
      <div class="sc-val">${total.toLocaleString()}</div>
      ${tPrev !== null ? `<div class="sc-sub">${total-tPrev >= 0 ? '+' : ''}${(total-tPrev).toLocaleString()} vs prev</div>` : ''}
    </div>
    <div class="stat-card">
      <span class="sc-label">Top Song</span>
      <div class="sc-val" style="font-size:15px;line-height:1.2">${top.title}</div>
      <div class="sc-sub">${(top.views[activeDate]||0).toLocaleString()} views</div>
    </div>
    <div class="stat-card">
      <span class="sc-label">Songs</span>
      <div class="sc-val">${csvData.songs.length}</div>
      <div class="sc-sub">tracked</div>
    </div>
    <div class="stat-card">
      <span class="sc-label">Dates</span>
      <div class="sc-val">${csvData.dates.length}</div>
      <div class="sc-sub">data points</div>
    </div>`;
}

function renderDateTabs() {
  const sel = document.getElementById("date-select");
  sel.innerHTML = csvData.dates.map(d =>
    `<option value="${d}" ${d === activeDate ? 'selected' : ''}>${formatDate(d)}</option>`
  ).join('');

  sel.addEventListener('change', () => {
    activeDate = sel.value;
    updateDateNav();
    renderStats(); renderChart();
  });

  document.getElementById("date-prev").addEventListener('click', () => {
    const i = csvData.dates.indexOf(activeDate);
    if (i > 0) { activeDate = csvData.dates[i - 1]; sel.value = activeDate; updateDateNav(); renderStats(); renderChart(); }
  });

  document.getElementById("date-next").addEventListener('click', () => {
    const i = csvData.dates.indexOf(activeDate);
    if (i < csvData.dates.length - 1) { activeDate = csvData.dates[i + 1]; sel.value = activeDate; updateDateNav(); renderStats(); renderChart(); }
  });

  updateDateNav();
}

function updateDateNav() {
  const i = csvData.dates.indexOf(activeDate);
  document.getElementById("date-prev").disabled = i <= 0;
  document.getElementById("date-next").disabled = i >= csvData.dates.length - 1;
  document.getElementById("date-select").value = activeDate;
}

function renderChart() {
  const prev     = csvData.dates[csvData.dates.indexOf(activeDate) - 1];
  const sorted   = [...csvData.songs].sort((a, b) => (b.views[activeDate]||0) - (a.views[activeDate]||0));
  const max      = Math.max(...sorted.map(s => s.views[activeDate] || 0));
  const tip      = document.getElementById("tip");
  const container = document.getElementById("chart-container");

  container.innerHTML = sorted.map((song, i) => {
    const v     = song.views[activeDate] || 0;
    const pv    = prev ? (song.views[prev] || 0) : null;
    const delta = pv !== null ? v - pv : null;
    const pct   = max > 0 ? (v / max * 100).toFixed(1) : 0;
    const color = COLORS[csvData.songs.indexOf(song) % COLORS.length];
    const dHtml = delta !== null
      ? `<span class="bar-delta ${delta < 0 ? 'neg' : delta === 0 ? 'zero' : ''}">${delta >= 0 ? '+' : ''}${delta}</span>` : '';
    const href  = song.url ? `href="${song.url}" target="_blank"` : '';
    return `
      <div class="song-row">
        <a class="song-name" ${href} style="text-decoration:none;color:inherit" title="${song.title}">${song.title}</a>
        <div class="bar-track">
          <div class="bar-fill" data-target="${pct}" style="background:linear-gradient(90deg,${color}99,${color})"></div>
        </div>
        <div class="bar-meta"><span class="bar-views">${v.toLocaleString()}</span>${dHtml}</div>
      </div>`;
  }).join('');

  requestAnimationFrame(() => requestAnimationFrame(() => {
    container.querySelectorAll('.bar-fill').forEach(b => { b.style.width = b.dataset.target + '%'; });
  }));

  container.querySelectorAll('.song-row').forEach((row, i) => {
    row.addEventListener('mousemove', e => {
      tip.textContent = `${sorted[i].title}  ·  ${(sorted[i].views[activeDate]||0).toLocaleString()} views`;
      tip.style.left = (e.clientX + 14) + 'px';
      tip.style.top  = (e.clientY - 32) + 'px';
      tip.classList.add('show');
    });
    row.addEventListener('mouseleave', () => tip.classList.remove('show'));
  });
}

function renderSparklines() {
  if (csvData.dates.length < 2) { document.getElementById("timeline-section").style.display = "none"; return; }
  document.getElementById("timeline-section").style.display = "";
  const sorted = [...csvData.songs].sort((a, b) =>
    (b.views[csvData.dates.at(-1)]||0) - (a.views[csvData.dates.at(-1)]||0));
  const first = csvData.dates[0], last = csvData.dates.at(-1);

  document.getElementById("sparklines").innerHTML = sorted.map((song, i) => {
    const fv = song.views[first] || 0, lv = song.views[last] || 0;
    const pct = fv > 0 ? ((lv - fv) / fv * 100).toFixed(1) : null;
    const neg = pct !== null && parseFloat(pct) < 0;
    return `
      <div class="spark-row">
        <div class="song-name" title="${song.title}">${song.title}</div>
        <canvas class="spark" id="spark-${i}" height="36"></canvas>
        <div class="spark-growth">
          <span class="pct ${neg ? 'neg' : ''}">${pct !== null ? (parseFloat(pct) >= 0 ? '+' : '') + pct + '%' : '—'}</span>
          <small>total growth</small>
        </div>
      </div>`;
  }).join('');

  requestAnimationFrame(() => {
    sorted.forEach((song, i) => {
      const canvas = document.getElementById(`spark-${i}`);
      if (!canvas) return;
      canvas.width  = canvas.offsetWidth * devicePixelRatio;
      canvas.height = 36 * devicePixelRatio;
      const ctx = canvas.getContext('2d');
      ctx.scale(devicePixelRatio, devicePixelRatio);
      const vals = csvData.dates.map(d => song.views[d] ?? null).filter(v => v !== null);
      if (vals.length < 2) return;
      const w = canvas.offsetWidth, h = 36, p = 4;
      const mn = Math.min(...vals), mx = Math.max(...vals), rng = mx - mn || 1;
      const color = COLORS[csvData.songs.indexOf(song) % COLORS.length];
      const px = j => (j / (vals.length - 1)) * (w - p*2) + p;
      const py = v => h - p - ((v - mn) / rng) * (h - p*2);

      const grad = ctx.createLinearGradient(0, 0, 0, h);
      grad.addColorStop(0, color + "44"); grad.addColorStop(1, color + "00");
      ctx.beginPath();
      vals.forEach((v, j) => j === 0 ? ctx.moveTo(px(j), py(v)) : ctx.lineTo(px(j), py(v)));
      ctx.lineTo(px(vals.length-1), h); ctx.lineTo(p, h); ctx.closePath();
      ctx.fillStyle = grad; ctx.fill();

      ctx.beginPath();
      vals.forEach((v, j) => j === 0 ? ctx.moveTo(px(j), py(v)) : ctx.lineTo(px(j), py(v)));
      ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.lineJoin = "round"; ctx.stroke();

      ctx.beginPath();
      ctx.arc(px(vals.length-1), py(vals.at(-1)), 3, 0, Math.PI*2);
      ctx.fillStyle = color; ctx.fill();
    });
  });
}

function formatDate(d) {
  try { const [y, m, day] = d.split("-"); return `${day}.${m}.${y.slice(2)}`; } catch { return d; }
}

boot();
</script>
